<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DURLOVELY | Admin Panel <!-- v2.4 --></title>
    <link rel="stylesheet" href="/shared-assets/css/main-v2026.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #A16207;
            --border: rgba(255,255,255,0.05);
        }
        body {
            background: #050505;
            color: #eee;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jost', sans-serif;
            margin: 0;
        }

        /* --- Original Sidebar Look --- */
        aside {
            width: 260px;
            background: #0c0a09;
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .nav-item {
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #888;
            text-decoration: none;
            transition: 0.3s;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .nav-item:hover {
            color: #eee;
            background: rgba(255,255,255,0.02);
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(161,98,7,0.05);
        }

        /* --- Main Content --- */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* --- Original Table Style --- */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead tr {
            border-bottom: 1px solid var(--border);
            color: #666;
            font-size: 13px;
        }

        th {
            padding: 15px 0;
            font-weight: 500;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.01);
        }

        td {
            padding: 20px 0;
            font-size: 14px;
        }

        /* --- UI Components --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .chart-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            height: 400px;
        }

        .stat-card {
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
        }

        /* Status Badges */
        .status-badge {
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending { background: rgba(161,98,7,0.1); color: var(--accent); }
        .status-delivered { background: rgba(34,197,94,0.1); color: #22c55e; }
        .status-cancelled { background: rgba(239,68,68,0.1); color: #ef4444; }
        .status-paid { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
        .status-unpaid { background: rgba(161,98,7,0.1); color: var(--accent); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #111;
            width: 480px;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #666; }
        input, select, textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--border);
            padding: 12px 14px;
            border-radius: 10px;
            color: #eee;
            font-family: inherit;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-exit {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: #888;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn-exit:hover { color: #eee; background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); }
    
        .btn-primary-old {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Tabs System */
        .modal-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #666;
            padding: 8px 15px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: var(--accent);
            background: rgba(161,98,7,0.1);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .history-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 13px;
        }
        .history-amount { font-weight: 700; float: right; }
        .amount-plus { color: #22c55e; }
        .amount-minus { color: #ef4444; }
    </style>
</head>
<body>

    <aside>
        <div class="brand-section">
            <img src="/shared-assets/assets/images/logo.png" style="width: 60px; height: 60px; border-radius: 50%;">
            <h1 class="luxury-text gold-text" style="font-size: 1.5rem; margin: 0; text-align: center;">DURLOVELY</h1>
        </div>
        <nav style="margin-top: 20px;">
            <a href="#" class="nav-item active" onclick="switchView('dashboard', this)">
                <i class="fa-solid fa-chart-line"></i>
                <span>Statistika</span>
            </a>
            <a href="#" class="nav-item" onclick="switchView('orders', this)">
                <i class="fa-solid fa-shopping-cart"></i>
                <span>Buyurtmalar</span>
            </a>
            <a href="#" class="nav-item" onclick="switchView('products', this)">
                <i class="fa-solid fa-box"></i>
                <span>Mahsulotlar</span>
            </a>
            <a href="#" class="nav-item" onclick="switchView('customers', this)">
                <i class="fa-solid fa-users"></i>
                <span>Mijozlar</span>
            </a>
            <a href="#" class="nav-item" onclick="switchView('notifs', this)">
                <i class="fa-solid fa-bell"></i>
                <span>Xabarnomalar</span>
            </a>
            <a href="#" class="nav-item" onclick="switchView('slides', this)">
                <i class="fa-solid fa-images"></i>
                <span>Slayderlar</span>
            </a>
        </nav>

        <button class="btn-exit" onclick="window.location.reload()">CHIQISH</button>
    </aside>

    <main id="main-content">
        <!-- Dynamic Content -->
    </main>

    <!-- Product Modal -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="luxury-text" id="modal-title" style="font-size: 1.3rem; margin-bottom: 25px;">Yangi Mahsulot</h3>
            <form id="product-form">
                <input type="hidden" id="p-id">
                <div class="form-group">
                    <label>Nomi</label>
                    <input type="text" id="p-name" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Standard Narxi (UZS)</label>
                        <input type="number" id="p-price" required>
                    </div>
                    <div class="form-group">
                        <label>VIP Narxi (UZS)</label>
                        <input type="number" id="p-vip-price" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Kategoriya</label>
                    <select id="p-category"></select>
                </div>
                <div class="form-group">
                    <label>Stokda (dona)</label>
                    <input type="number" id="p-stock" required>
                </div>
                <div class="form-group">
                    <label>Mahsulot rasm URL</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="p-image-url" placeholder="https://..." style="flex: 1;">
                        <input type="file" id="p-image-file" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">
                        <button type="button" onclick="document.getElementById('p-image-file').click()" style="padding: 0 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; color: #888;">
                            <i class="fa-solid fa-upload"></i>
                        </button>
                    </div>
                    <div id="upload-status" style="font-size: 10px; margin-top: 5px; color: var(--accent);"></div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 25px;">
                    <button type="button" onclick="closeModal()" style="background: none; border: 1px solid var(--border); color: #888; flex: 1; padding: 12px; border-radius: 10px; cursor: pointer;">BEKOR</button>
                    <button type="submit" class="btn-primary-old" style="flex: 1.5;">SAQLASH</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Universal Pro Customer Modal -->
    <div id="customer-pro-modal" class="modal-overlay">
        <div class="modal-content" style="width: 550px; max-height: 85vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px;">
                <div>
                    <h3 class="luxury-text" id="pro-cust-name" style="font-size: 1.5rem; margin: 0;">Mijoz</h3>
                    <p id="pro-cust-phone" style="font-size: 12px; color: #666; margin-top: 5px;"></p>
                </div>
                <div id="pro-cust-badge"></div>
            </div>

            <div class="modal-tabs">
                <button class="tab-btn active" onclick="switchCustTab('tab-info', this)">INFO</button>
                <button class="tab-btn" onclick="switchCustTab('tab-wallet', this)">HAMYON</button>
                <button class="tab-btn" onclick="switchCustTab('tab-orders', this)">BUYURTMALAR</button>
                <button class="tab-btn" onclick="switchCustTab('tab-control', this)">KONTROL</button>
            </div>

            <!-- Info Tab -->
            <div id="tab-info" class="tab-content active">
                <div class="form-group">
                    <label>F.I.SH</label>
                    <input type="text" id="pro-name-input">
                </div>
                <div class="form-group">
                    <label>Status (VIP)</label>
                    <select id="pro-vip-input">
                        <option value="false">Oddiy Mijoz</option>
                        <option value="true">VIP A'zo</option>
                    </select>
                </div>
                <button class="btn-primary-old" style="width: 100%; margin-top: 10px;" onclick="saveProCustInfo()">MA'LUMOTLARNI SAQLASH</button>
            </div>

            <!-- Wallet Tab -->
            <div id="tab-wallet" class="tab-content">
                <div style="background: rgba(161,98,7,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center;">
                    <div style="font-size: 11px; color: #666;">JORIY BALANS</div>
                    <div style="font-size: 24px; font-weight: 800; color: var(--accent);" id="pro-dur-balance">0 DUR</div>
                </div>
                
                <div class="form-group">
                    <label>Balansni o'zgartirish (+/-)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="pro-dur-change" placeholder="Masalan: 5.5 yoki -2">
                        <button class="btn-primary-old" style="white-space: nowrap;" onclick="adjustProDur()">O'ZGARTIRISH</button>
                    </div>
                </div>

                <div style="margin-top: 25px;">
                    <label>Balans Tarixi</label>
                    <div id="pro-dur-history" style="max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px;"></div>
                </div>
            </div>

            <!-- Orders Tab -->
            <div id="tab-orders" class="tab-content">
                <label>Buyurtmalar Tarixi</label>
                <div id="pro-orders-list" style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px;">
                    <!-- Real-time orders fetch -->
                </div>
            </div>

            <!-- Control Tab -->
            <div id="tab-control" class="tab-content">
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <button id="pro-block-btn" class="btn-primary-old" style="background: #ef4444;" onclick="toggleProBlock()"></button>
                    <button class="btn-exit" style="width: 100%;" onclick="deleteCustomerPro()">MIJOZNI BUTUNLAY O'CHIRISH</button>
                </div>
            </div>

            <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
                <button type="button" onclick="closeProModal()" style="background: none; border: 1px solid var(--border); color: #888; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer;">YOPISH</button>
            </div>
        </div>
    </div>

    <!-- Slide Modal -->
    <div id="slide-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="luxury-text" id="s-modal-title" style="font-size: 1.3rem; margin-bottom: 25px;">Yangi Slayd</h3>
            <form id="slide-form">
                <input type="hidden" id="s-id">
                <div class="form-group">
                    <label>Sarlavha (Title)</label>
                    <input type="text" id="s-title" required>
                </div>
                <div class="form-group">
                    <label>Mahsulot IDlari (vergul bilan ajrating, max 15ta)</label>
                    <input type="text" id="s-pids" placeholder="1, 2, 1775448916737">
                </div>
                <div class="form-group">
                    <label>Slayd rasm/video URL</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="s-image-url" placeholder="https://..." style="flex: 1;">
                        <input type="file" id="s-image-file" accept="image/*,video/*" style="display: none;" onchange="handleSlideImageUpload(this)">
                        <button type="button" onclick="document.getElementById('s-image-file').click()" style="padding: 0 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; color: #888;">
                            <i class="fa-solid fa-upload"></i>
                        </button>
                    </div>
                    <div id="s-upload-status" style="font-size: 10px; margin-top: 5px; color: var(--accent);"></div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 25px;">
                    <button type="button" onclick="closeSlideModal()" style="background: none; border: 1px solid var(--border); color: #888; flex: 1; padding: 12px; border-radius: 10px; cursor: pointer;">BEKOR</button>
                    <button type="submit" class="btn-primary-old" style="flex: 1.5;">SAQLASH</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-confirm-modal" class="modal-overlay" style="z-index: 1000;">
        <div class="modal-content" style="width: 350px; text-align: center; padding: 40px 30px;">
            <div style="width: 60px; height: 60px; background: rgba(239,68,68,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
                <i class="fa-solid fa-triangle-exclamation" style="font-size: 24px; color: #ef4444;"></i>
            </div>
            <h3 class="luxury-text" style="font-size: 1.2rem; margin-bottom: 10px;">O'chirishni tasdiqlang</h3>
            <p style="color: #888; font-size: 14px; margin-bottom: 30px; line-height: 1.5;">Haqiqatan ham ushbu elementni o'chirmoqchimisiz? Bu amalni ortga qaytarib bo'lmaydi.</p>
            <div style="display: flex; gap: 15px;">
                <button type="button" onclick="closeDeleteConfirmModal()" style="background: none; border: 1px solid var(--border); color: #888; flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600;">BEKOR</button>
                <button type="button" id="confirm-delete-btn" style="background: #ef4444; border: none; color: #fff; flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 15px rgba(239,68,68,0.3);">O'CHIRISH</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            view: 'dashboard',
            orders: [],
            products: [],
            categories: [],
            customers: [],
            notifs: [],
            slides: []
        };

        const API_BASE = '/api';

        async function init() {
            await fetchData();
            renderView();
        }

        async function fetchData() {
            try {
                const [ordersRes, productsRes, categoriesRes, customersRes, notifsRes, slidesRes] = await Promise.all([
                    fetch(`${API_BASE}/orders`),
                    fetch(`${API_BASE}/products`),
                    fetch(`${API_BASE}/categories`),
                    fetch(`${API_BASE}/customers`).catch(() => ({ json: () => [] })),
                    fetch(`${API_BASE}/notifications`).catch(() => ({ json: () => [] })),
                    fetch(`${API_BASE}/slides`).catch(() => ({ json: () => [] }))
                ]);
                state.orders = await ordersRes.json();
                state.products = await productsRes.json();
                state.categories = await categoriesRes.json();
                state.customers = customersRes.ok ? await customersRes.json() : [];
                state.notifs = notifsRes.ok ? await notifsRes.json() : [];
                state.slides = slidesRes.ok ? await slidesRes.json() : [];
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function switchView(view, el) {
            state.view = view;
            document.querySelectorAll('.nav-item').forEach(link => link.classList.remove('active'));
            el.classList.add('active');
            renderView();
        }

        function renderView() {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <header>
                    <h2 class="luxury-text" style="font-size: 2rem;">${state.view.charAt(0).toUpperCase() + state.view.slice(1)}</h2>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <span style="font-size: 14px; color: #666;">Salom, Admin</span>
                        <img src="/shared-assets/assets/images/logo.png" style="width: 40px; height: 40px; border-radius: 50%;">
                    </div>
                </header>
            `;
            
            if (state.view === 'dashboard') renderDashboard(container);
            if (state.view === 'orders') renderOrders(container);
            if (state.view === 'products') renderProducts(container);
            if (state.view === 'customers') renderCustomers(container);
            if (state.view === 'notifs') renderNotifs(container);
            if (state.view === 'slides') renderSlides(container);
        }

        function renderDashboard(container) {
            const totalSotuv = state.orders.reduce((acc, o) => {
                const val = o.total ? String(o.total).replace(/,/g, '') : '0';
                return acc + parseInt(val || 0);
            }, 0);
            const pendingOrders = state.orders.filter(o => o.status === 'pending').length;

            container.innerHTML += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div style="color: #666; font-size: 11px; text-transform: uppercase;">Bugun Sotuv</div>
                        <div style="font-size: 24px; font-weight: 700; margin-top: 5px;">${totalSotuv.toLocaleString()} UZS</div>
                    </div>
                    <div class="stat-card">
                        <div style="color: #666; font-size: 11px; text-transform: uppercase;">Yangi Buyurtma</div>
                        <div style="font-size: 24px; font-weight: 700; margin-top: 5px; color: var(--accent);">${pendingOrders} ta</div>
                    </div>
                    <div class="stat-card">
                        <div style="color: #666; font-size: 11px; text-transform: uppercase;">Mahsulotlar</div>
                        <div style="font-size: 24px; font-weight: 700; margin-top: 5px;">${state.products.length} xil</div>
                    </div>
                    <div class="stat-card">
                        <div style="color: #666; font-size: 11px; text-transform: uppercase;">Mijozlar</div>
                        <div style="font-size: 24px; font-weight: 700; margin-top: 5px;">${state.customers.length || '1,200+'}</div>
                    </div>
                </div>
                
                <div style="background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; border: 1px solid var(--border);">
                    <h3 class="luxury-text" style="font-size: 1.5rem; margin-bottom: 25px;">Oxirgi Buyurtmalar</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>MIJOZ</th>
                                <th>SUMMA</th>
                                <th>TO'LOV</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${state.orders.slice(0, 5).map(o => `
                                <tr>
                                    <td>#${o.id}</td>
                                    <td>${o.customer || o.name || 'Mijoz'}</td>
                                    <td style="font-weight: 600;">${o.total} UZS</td>
                                    <td>
                                        <span class="status-badge ${o.paymentStatus === 'paid' ? 'status-paid' : 'status-unpaid'}">
                                            ${o.paymentStatus === 'paid' ? 'To\'langan' : 'Kutilmoqda'}
                                        </span>
                                    </td>
                                    <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderOrders(container) {
            container.innerHTML += `
                <div style="background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; border: 1px solid var(--border);">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>MIJOZ</th>
                                <th>MAHSULOTLAR</th>
                                <th>SUMMA</th>
                                <th>TO'LOV</th>
                                <th>STATUS</th>
                                <th style="text-align: right;">AMAL</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${state.orders.map(o => `
                                <tr>
                                    <td>#${o.id}</td>
                                    <td>${o.customer || o.name || 'Mijoz'}</td>
                                    <td style="max-width: 200px; font-size: 12px; color: #888;">${(o.items || []).join(', ')}</td>
                                    <td style="font-weight: 600;">${o.total || '0'} UZS</td>
                                    <td>
                                        <span class="status-badge ${o.paymentStatus === 'paid' ? 'status-paid' : 'status-unpaid'}">
                                            ${o.paymentStatus === 'paid' ? 'To\'langan' : 'Kutilmoqda'}
                                        </span>
                                    </td>
                                    <td><span class="status-badge status-${o.status}">${o.status}</span></td>

        window.adjustProDur = async function() {
            const change = parseFloat(document.getElementById('pro-dur-change').value);
            if (isNaN(change)) return;

            const newDur = (currentProCust.dur || 0) + change;
            const history = currentProCust.durHistory || [];
            history.unshift({
                reason: `Admin tomonidan tuzatish (${change > 0 ? '+' : ''}${change})`,
                amount: change,
                date: new Date().toLocaleString()
            });

            try {
                const res = await fetch(`${API_BASE}/customers/${currentProCust.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dur: newDur, durHistory: history.slice(0, 50) })
                });
                if (res.ok) { 
                    document.getElementById('pro-dur-change').value = '';
                    await fetchData(); 
                    // Update local view
                    const updated = state.customers.find(c => c.id === currentProCust.id);
                    openProModal(updated);
                    renderView(); 
                }
            } catch (e) { alert("Xatolik!"); }
        }

        async function handleImageUpload(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const status = document.getElementById('upload-status');
            
            // Limit file size to 2MB to keep MongoDB documents small
            if (file.size > 2 * 1024 * 1024) {
                status.innerText = "❌ Fayl juda katta (max 2MB)!";
                return;
            }

            status.innerText = "Tayyorlanmoqda...";
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result;
                document.getElementById('p-image-url').value = base64Data;
                status.innerText = "✅ Rasm tayyor (Saqlashni bosing)!";
            };
            reader.readAsDataURL(file);
        }

                productIds: productIds
            };

            const url = id ? `${API_BASE}/slides/${id}` : `${API_BASE}/slides`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) { closeSlideModal(); await fetchData(); renderView(); }
            } catch (e) { alert("Server xatosi"); }
        };

        window.onclick = (e) => { 
            if (e.target.classList.contains('modal-overlay')) {
                closeModal(); 
                closePointsModal();
                closeSlideModal();
            }
        };

        init();
    </script>
</body>
</html>
