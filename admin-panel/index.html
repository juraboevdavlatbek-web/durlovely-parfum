<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DURLOVELY | Admin Business</title>
    <link rel="stylesheet" href="../shared-assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --sidebar-width: 280px;
        }
        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #050505;
        }
        aside {
            width: var(--sidebar-width);
            background: #0c0a09;
            border-right: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        main {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            position: relative;
        }
        .nav-link {
            padding: 14px 20px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 16px;
            color: #888;
            text-decoration: none;
            transition: var(--transition-fast);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.03);
            color: #eee;
        }
        .nav-link.active {
            color: var(--accent);
            background: rgba(161,98,7,0.08);
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: -10px;
        }
        th {
            text-align: left;
            padding: 20px;
            color: #555;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 800;
        }
        td {
            padding: 24px 20px;
            background: rgba(255,255,255,0.02);
            font-size: 14px;
            border-top: 1px solid rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.02);
            transition: var(--transition-fast);
        }
        tr:hover td {
            background: rgba(255,255,255,0.04);
            border-color: rgba(161,98,7,0.2);
        }
        td:first-child { border-radius: 20px 0 0 20px; border-left: 1px solid rgba(255,255,255,0.02); }
        td:last-child { border-radius: 0 20px 20px 0; border-right: 1px solid rgba(255,255,255,0.02); }

        .status-badge {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        .status-pending { background: rgba(161,98,7,0.1); color: var(--accent); }
        .status-delivered { background: rgba(34,197,94,0.1); color: #22c55e; }
        .status-cancelled { background: rgba(239,68,68,0.1); color: #ef4444; }

        .dashboard-card {
            padding: 35px;
            border-radius: 28px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
        }
        .dashboard-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            background: var(--accent);
            filter: blur(80px);
            opacity: 0.05;
            pointer-events: none;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #111;
            width: 500px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            animation: fluidEntrance 0.4s ease-out;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #666; }
        input, select, textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 10px;
            color: #eee;
            font-family: inherit;
        }
        input:focus { border-color: var(--accent); outline: none; }
    </style>
</head>
<body>

    <aside>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 50px;">
            <img src="../shared-assets/assets/images/logo.png" style="width: 70px; height: 70px; border-radius: 50%; border: 1px solid var(--border); padding: 5px; background: rgba(255,255,255,0.03);">
            <div class="luxury-text gold-text" style="font-size: 1.6rem; text-align: center;">DURLOVELY</div>
        </div>
        
        <nav>
            <a href="#" class="nav-link active" onclick="switchView('dashboard', this)">
                <i class="fa-solid fa-house-chimney"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-link" onclick="switchView('orders', this)">
                <i class="fa-solid fa-receipt"></i>
                <span>Buyurtmalar</span>
            </a>
            <a href="#" class="nav-link" onclick="switchView('products', this)">
                <i class="fa-solid fa-box-open"></i>
                <span>Mahsulotlar</span>
            </a>
            <a href="#" class="nav-link" onclick="switchView('customers', this)">
                <i class="fa-solid fa-user-group"></i>
                <span>Mijozlar</span>
            </a>
            <a href="#" class="nav-link" onclick="switchView('notifs', this)">
                <i class="fa-solid fa-bell"></i>
                <span>Xabarnomalar</span>
            </a>
        </nav>

        <div style="margin-top: auto;">
            <div class="liquid-glass" style="padding: 20px; border-radius: 16px; margin-bottom: 20px;">
                <div style="font-size: 12px; color: #666;">Admin Sessiya</div>
                <div style="font-size: 14px; margin-top: 5px;">Nurmuhammad A.</div>
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="window.location.reload()">
                <i class="fa-solid fa-power-off"></i> CHIQISH
            </button>
        </div>
    </aside>

    <main id="main-content">
        <!-- Dynamic Content -->
    </main>

    <!-- Product Modal -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="luxury-text" id="modal-title" style="font-size: 1.5rem; margin-bottom: 30px;">Yangi Mahsulot</h3>
            <form id="product-form">
                <input type="hidden" id="p-id">
                <div class="form-group">
                    <label>Nomi</label>
                    <input type="text" id="p-name" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Narxi (UZS)</label>
                        <input type="number" id="p-price" required>
                    </div>
                    <div class="form-group">
                        <label>VIP Narxi (UZS)</label>
                        <input type="number" id="p-vip-price" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Kategoriya</label>
                    <select id="p-category">
                        <!-- Loaded dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Stokda (dona)</label>
                    <input type="number" id="p-stock" required>
                </div>
                <div class="form-group">
                    <label>Mahsulot rasmi</label>
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <div id="image-preview" style="width: 80px; height: 80px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; color: #444;">
                            <i class="fa-solid fa-camera" style="font-size: 24px;"></i>
                        </div>
                        <div style="flex: 1;">
                            <input type="file" id="p-image-file" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">
                            <button type="button" class="liquid-glass" style="width: 100%; padding: 10px; font-size: 11px; font-weight: 700;" onclick="document.getElementById('p-image-file').click()">RASM TANLASH</button>
                            <input type="hidden" id="p-image-url">
                        </div>
                    </div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="button" class="btn-primary" style="background: transparent; border: 1px solid var(--border);" onclick="closeModal()">BEKOR QILISH</button>
                    <button type="submit" class="btn-primary" style="flex: 1;">SAQLASH</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) { tg.expand(); tg.ready(); }

        function showAlert(msg) {
            if (tg && tg.showAlert) tg.showAlert(msg);
            else alert(msg);
        }

        function showConfirm(msg, callback) {
            if (tg && tg.showConfirm) tg.showConfirm(msg, callback);
            else callback(confirm(msg));
        }

        const state = {
            currentView: 'dashboard',
            orders: [],
            products: [],
            customers: [],
            categories: [],
            notifs: [],
            isUploading: false
        };

        const API_BASE = '/api';

        async function init() {
            await fetchData();
            renderView('dashboard');
        }

        async function fetchData() {
            const v = Date.now();
            try {
                const [ordersRes, productsRes, categoriesRes, customersRes, notifsRes] = await Promise.all([
                    fetch(`${API_BASE}/orders?v=${v}`),
                    fetch(`${API_BASE}/products?v=${v}`),
                    fetch(`${API_BASE}/categories?v=${v}`),
                    fetch(`${API_BASE}/customers?v=${v}`),
                    fetch(`${API_BASE}/notifications?v=${v}`)
                ]);
                state.orders = await ordersRes.json();
                state.products = await productsRes.json();
                state.categories = await categoriesRes.json();
                state.customers = await customersRes.json();
                state.notifs = await notifsRes.json();
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function renderView(view) {
            state.currentView = view;
            const container = document.getElementById('main-content');
            
            // Update sidebar active state
            document.querySelectorAll('.nav-link').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('onclick').includes(`'${view}'`)) {
                    item.classList.add('active');
                }
            });

            switch(view) {
                case 'dashboard': renderDashboard(container); break;
                case 'orders': renderOrders(container); break;
                case 'products': renderProducts(container); break;
                case 'customers': renderCustomers(container); break;
                case 'notifs': renderNotifs(container); break;
            }
        }
        
        init();

        function switchView(view, el) {
            renderView(view);
            if (el) {
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function renderDashboard(container) {
            const totalSotuv = state.orders.reduce((acc, o) => acc + parseInt(o.total.replace(/,/g, '') || 0), 0);
            const pendingOrders = state.orders.filter(o => o.status === 'pending').length;

            container.innerHTML = `
                <div class="animate-fluid">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
                        <h2 class="luxury-text" style="font-size: 2.8rem; letter-spacing: -0.02em;">Biznes Analitika</h2>
                        <div style="color: #666; font-size: 13px;">So'nggi yangilanish: <span style="color: #fff;">Hozir</span></div>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 60px;">
                        <div class="dashboard-card">
                            <div style="color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; font-weight: 700;">Umumiy Sotuv</div>
                            <div style="font-size: 32px; font-weight: 800;">${totalSotuv.toLocaleString()} <span style="font-size: 14px; font-weight: 400; color: #444;">UZS</span></div>
                            <div style="margin-top: 15px; color: #22c55e; font-size: 12px; font-weight: 600;"><i class="fa-solid fa-arrow-trend-up"></i> +12% oylik</div>
                        </div>
                        <div class="dashboard-card" style="border-color: rgba(161,98,7,0.15);">
                            <div style="color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; font-weight: 700;">Kutilayotgan</div>
                            <div style="font-size: 32px; font-weight: 800; color: var(--accent);">${pendingOrders} <span style="font-size: 14px; font-weight: 400; color: #444;">ta</span></div>
                            <div style="margin-top: 15px; color: var(--accent); font-size: 12px; font-weight: 600;"><i class="fa-solid fa-clock"></i> Faol navbat</div>
                        </div>
                        <div class="dashboard-card">
                            <div style="color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; font-weight: 700;">Mahsulotlar</div>
                            <div style="font-size: 32px; font-weight: 800;">${state.products.length} <span style="font-size: 14px; font-weight: 400; color: #444;">xil</span></div>
                            <div style="margin-top: 15px; color: #888; font-size: 12px; font-weight: 600;"><i class="fa-solid fa-layer-group"></i> 8 ta kategoriya</div>
                        </div>
                        <div class="dashboard-card">
                            <div style="color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; font-weight: 700;">Mijozlar</div>
                            <div style="font-size: 32px; font-weight: 800;">${state.customers.length} <span style="font-size: 14px; font-weight: 400; color: #444;">nafar</span></div>
                            <div style="margin-top: 15px; color: #22c55e; font-size: 12px; font-weight: 600;"><i class="fa-solid fa-crown" style="color: var(--accent);"></i> ${state.customers.filter(c => c.isVip).length} VIP</div>
                        </div>
                    </div>
                    
                    <div class="liquid-glass" style="padding: 45px; border-radius: 36px; border-color: rgba(255,255,255,0.03);">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                            <h3 class="luxury-text" style="font-size: 1.8rem;">So'nggi harakatlar</h3>
                            <button class="liquid-glass" style="padding: 8px 16px; font-size: 11px; color: #888;">Barchasini ko'rish</button>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 24px;">
                            ${state.orders.slice(0, 5).map(o => `
                                <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.03);">
                                    <div style="display: flex; align-items: center; gap: 20px;">
                                        <div style="width: 45px; height: 45px; border-radius: 12px; background: rgba(161,98,7,0.05); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 18px;">
                                            <i class="fa-solid fa-receipt"></i>
                                        </div>
                                        <div>
                                            <div style="font-weight: 600; font-size: 15px;">Buyurtma #${o.id}</div>
                                            <div style="font-size: 12px; color: #555; margin-top: 2px;">${o.customer} • ${o.date}</div>
                                        </div>
                                    </div>
                                    <div style="text-align: right;">
                                        <div style="font-weight: 800; color: #fff; font-size: 15px;">${o.total} UZS</div>
                                        <div style="font-size: 10px; color: var(--accent); font-weight: 700; margin-top: 4px; text-transform: uppercase;">${o.status.toUpperCase()}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOrders(container) {
            container.innerHTML = `
                <div class="animate-fluid">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
                        <h2 class="luxury-text" style="font-size: 2.8rem;">Buyurtmalar</h2>
                        <div class="liquid-glass" style="padding: 10px 20px; font-size: 13px;">
                            <i class="fa-solid fa-filter" style="margin-right: 10px; color: var(--accent);"></i> Saralash: <span style="color: #fff;">Sana bo'yicha</span>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Sana / ID</th>
                                <th>Mijoz tafsilotlari</th>
                                <th>Mahsulotlar</th>
                                <th>Umumiy summa</th>
                                <th>Status</th>
                                <th style="text-align: right;">Amal</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${state.orders.map(o => `
                                <tr>
                                    <td>
                                        <div style="font-weight: 700; color: #fff;">#${o.id}</div>
                                        <div style="font-size: 11px; color: #555; margin-top: 4px;">${o.date}</div>
                                    </td>
                                    <td>
                                        <div style="font-weight: 600; font-size: 15px;">${o.customer}</div>
                                        <div style="font-size: 12px; color: var(--accent); margin-top: 4px;">${o.phone}</div>
                                    </td>
                                    <td style="max-width: 250px;">
                                        <div style="font-size: 13px; color: #aaa; line-height: 1.4;">${o.items.join(', ')}</div>
                                    </td>
                                    <td>
                                        <div style="font-weight: 800; color: #fff; font-size: 16px;">${o.total} <span style="font-size: 11px; color: #444;">UZS</span></div>
                                    </td>
                                    <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                                    <td style="text-align: right;">
                                        <div style="display: flex; gap: 10px; justify-content: flex-end; align-items: center;">
                                            <select onchange="updateOrderStatus(${o.id}, this.value)" style="width: auto; padding: 10px 15px; font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); color: #eee; border-radius: 12px; outline: none; cursor: pointer;">
                                                <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Kutishda</option>
                                                <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Yetkazildi</option>
                                                <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Bekor</option>
                                            </select>
                                            <button class="liquid-glass" style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; color: #666; border-radius: 12px;"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderProducts(container) {
            container.innerHTML = `
                <div class="animate-fluid">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
                        <h2 class="luxury-text" style="font-size: 2.8rem;">Mahsulotlar</h2>
                        <button class="btn-primary" onclick="openProductModal()" style="padding: 12px 24px; border-radius: 16px;">
                            <i class="fa-solid fa-plus" style="margin-right: 10px;"></i> YANGI QO'SHISH
                        </button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Mahsulot va ID</th>
                                <th>Kategoriya</th>
                                <th>Klub narxi</th>
                                <th>Standard narx</th>
                                <th>Stok holati</th>
                                <th style="text-align: right;">Amallar</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${state.products.map(p => `
                                <tr>
                                    <td>
                                        <div style="display: flex; align-items: center; gap: 15px;">
                                            <div style="width: 50px; height: 50px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #444;">
                                                ${p.image ? `<img src="${p.image}" style="width: 100%; height: 100%; object-fit: cover;">` : '<i class="fa-solid fa-bottle-droplet"></i>'}
                                            </div>
                                            <div>
                                                <div style="font-weight: 700; font-size: 15px; color: #fff;">${p.name}</div>
                                                <div style="font-size: 11px; color: #555; margin-top: 4px;">ID: ${p.id}</div>
                                            </div>
                                        </div>
                                    </td>
                                    <td><span style="color: #888; font-size: 13px; font-weight: 500;">${p.category}</span></td>
                                    <td><div style="font-weight: 800; color: var(--accent); font-size: 16px;">${p.vip_price.toLocaleString()} <span style="font-size: 10px; font-weight: 400; opacity: 0.5;">UZS</span></div></td>
                                    <td><div style="font-weight: 600; color: #aaa; font-size: 14px;">${p.price.toLocaleString()}</div></td>
                                    <td>
                                        <div style="display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 8px; background: ${p.stock > 10 ? 'rgba(34,197,94,0.05)' : 'rgba(234,179,8,0.05)'}; color: ${p.stock > 10 ? '#22c55e' : '#eab308'}; font-size: 12px; font-weight: 700;">
                                            <div style="width: 50px; height: 4px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden;">
                                                <div style="width: ${Math.min(p.stock * 2, 100)}%; height: 100%; background: currentColor;"></div>
                                            </div>
                                            ${p.stock} ta
                                        </div>
                                    </td>
                                    <td style="text-align: right;">
                                        <div style="display: flex; gap: 8px; justify-content: flex-end;">
                                            <button onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="liquid-glass" style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; color: #888; border-radius: 12px;"><i class="fa-solid fa-pen-to-square"></i></button>
                                            <button onclick="deleteProduct(${p.id})" class="liquid-glass" style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; color: #ef4444; border-radius: 12px; border-color: rgba(239,68,68,0.1);"><i class="fa-solid fa-trash-can"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderCustomers(container) {
            const vipCount = state.customers.filter(c => c.isVip).length;
            container.innerHTML = `
                <div class="animate-fluid">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
                        <div>
                            <h2 class="luxury-text" style="font-size: 2.8rem;">Mijozlar Bazasi</h2>
                            <div style="font-size: 13px; color: #666; margin-top: 8px;">${state.customers.length} ta mijoz • <span style="color: var(--accent);">${vipCount} VIP</span></div>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Mijoz</th>
                                <th>Telefon raqami</th>
                                <th>Telegram ID</th>
                                <th>Ro'yxatdan o'tgan</th>
                                <th>Status</th>
                                <th style="text-align: right;">VIP Boshqaruv</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${state.customers.map(c => `
                                <tr>
                                    <td>
                                        <div style="display: flex; align-items: center; gap: 15px;">
                                            <div style="width: 45px; height: 45px; border-radius: 50%; background: ${c.isVip ? 'linear-gradient(135deg, rgba(161,98,7,0.2), rgba(212,160,23,0.1))' : 'rgba(255,255,255,0.03)'}; display: flex; align-items: center; justify-content: center; font-size: 16px; color: ${c.isVip ? 'var(--accent)' : '#555'}; border: 1px solid ${c.isVip ? 'rgba(161,98,7,0.3)' : 'var(--border)'}; font-weight: 700;">
                                                ${c.isVip ? '👑' : (c.firstName ? c.firstName[0].toUpperCase() : '?')}
                                            </div>
                                            <div>
                                                <div style="font-weight: 600; font-size: 15px; color: #fff;">${c.firstName || 'Noma\'lum'}</div>
                                                <div style="font-size: 11px; color: #555; margin-top: 3px;">ID: ${c.id}</div>
                                            </div>
                                        </div>
                                    </td>
                                    <td><div style="font-weight: 600; color: var(--accent); font-size: 14px;">${c.phone}</div></td>
                                    <td><div style="font-size: 13px; color: #888;">${c.tgId || '—'}</div></td>
                                    <td><div style="font-size: 13px; color: #888;">${c.dateJoined || '—'}</div></td>
                                    <td>
                                        <span class="status-badge ${c.isVip ? 'status-delivered' : 'status-pending'}">
                                            ${c.isVip ? '👑 VIP' : 'Oddiy'}
                                        </span>
                                    </td>
                                    <td style="text-align: right;">
                                        <button onclick="toggleVip(${c.id})" class="liquid-glass" style="padding: 10px 20px; border-radius: 14px; font-size: 12px; font-weight: 700; color: ${c.isVip ? '#ef4444' : 'var(--accent)'}; border-color: ${c.isVip ? 'rgba(239,68,68,0.15)' : 'rgba(161,98,7,0.15)'}; cursor: pointer; transition: 0.2s;">
                                            <i class="fa-solid ${c.isVip ? 'fa-crown-simple' : 'fa-crown'}" style="margin-right: 6px;"></i>
                                            ${c.isVip ? 'VIP OLISH' : 'VIP BERISH'}
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    ${state.customers.length === 0 ? '<div style="text-align: center; padding: 80px 0; color: #555;"><i class="fa-solid fa-users" style="font-size: 48px; margin-bottom: 20px; display: block; opacity: 0.3;"></i>Hozircha mijozlar yo\'q</div>' : ''}
                </div>
            `;
        }

        async function updateOrderStatus(id, status) {
            try {
                const res = await fetch(`${API_BASE}/orders/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (res.ok) {
                    await fetchData();
                    renderView(state.currentView);
                }
            } catch (e) { showAlert("Xatolik yuz berdi"); }
        }

        function deleteProduct(id) {
            showConfirm("Haqiqatdan ham o'chirmoqchimisiz?", async (isOk) => {
                if (!isOk) return;
                try {
                    const res = await fetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        await fetchData();
                        renderView(state.currentView);
                    }
                } catch (e) { showAlert("Xatolik yuz berdi"); }
            });
        }

        async function toggleVip(customerId) {
            const customer = state.customers.find(c => c.id === customerId);
            const action = customer && customer.isVip ? "VIP statusni OLISH" : "VIP status BERISH";
            showConfirm(`${action}ni xohlaysizmi?`, async (isOk) => {
                if (!isOk) return;
                try {
                    const res = await fetch(`${API_BASE}/customers/${customerId}/vip`, { method: 'POST' });
                    if (res.ok) {
                        await fetchData();
                        renderView(state.currentView);
                        showAlert(customer.isVip ? "VIP status berildi! ✅" : "VIP status olindi");
                    }
                } catch (e) { showAlert("Xatolik yuz berdi"); }
            });
        }

        function renderNotifs(container) {
            container.innerHTML = `
                <div class="animate-fluid">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
                        <div>
                            <h2 class="luxury-text" style="font-size: 2.8rem;">Xabarnomalar</h2>
                            <div style="font-size: 13px; color: #666; margin-top: 8px;">Barcha foydalanuvchilarga xabar yuborish</div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;">
                        <div class="liquid-glass" style="padding: 30px; border-radius: 24px; height: fit-content;">
                            <h3 style="margin-bottom: 25px; font-size: 18px; color: var(--accent);">Yangi xabar</h3>
                            <form id="notif-form" onsubmit="sendNotif(event)">
                                <div class="form-group">
                                    <label>Mavzu (Title)</label>
                                    <input type="text" id="n-title" placeholder="Masalan: Yangi chegirmalar!" required>
                                </div>
                                <div class="form-group">
                                    <label>Xabar matni</label>
                                    <textarea id="n-message" rows="5" style="width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 10px; padding: 15px; color: #fff;" required></textarea>
                                </div>
                                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">YUBORISH</button>
                            </form>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <h3 style="margin-bottom: 10px; font-size: 18px; color: #888;">Yuborilgan xabarlar</h3>
                            ${state.notifs.map(n => `
                                <div class="liquid-glass" style="padding: 20px; border-radius: 20px;">
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                        <div style="font-weight: 700; color: #fff;">${n.title || 'Mavzusiz'}</div>
                                        <div style="font-size: 11px; color: #444;">${n.date}</div>
                                    </div>
                                    <div style="font-size: 14px; color: #888; line-height: 1.6;">${n.message || n.text}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        async function sendNotif(e) {
            e.preventDefault();
            const title = document.getElementById('n-title').value;
            const message = document.getElementById('n-message').value;

            try {
                const res = await fetch(`${API_BASE}/notifications`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, message })
                });
                if (res.ok) {
                    showAlert("Xabar muvaffaqiyatli yuborildi! 🔔");
                    await fetchData();
                    renderView('notifs');
                }
            } catch (e) { showAlert("Xatolik yub berdi"); }
        }

        function openProductModal(p = null) {
            const modal = document.getElementById('product-modal');
            const catSelect = document.getElementById('p-category');
            catSelect.innerHTML = state.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            
            if (p) {
                document.getElementById('modal-title').innerText = "Tahrirlash";
                document.getElementById('p-id').value = p.id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-vip-price').value = p.vip_price;
                document.getElementById('p-category').value = p.category;
                document.getElementById('p-stock').value = p.stock;
                document.getElementById('p-image-url').value = p.image || '';
                if (p.image) {
                    document.getElementById('image-preview').innerHTML = `<img src="${p.image}" style="width: 100%; height: 100%; object-fit: cover;">`;
                } else {
                    document.getElementById('image-preview').innerHTML = `<i class="fa-solid fa-camera" style="font-size: 24px;"></i>`;
                }
            } else {
                document.getElementById('modal-title').innerText = "Yangi Mahsulot";
                document.getElementById('product-form').reset();
                document.getElementById('p-id').value = '';
                document.getElementById('p-image-url').value = '';
                document.getElementById('image-preview').innerHTML = `<i class="fa-solid fa-camera" style="font-size: 24px;"></i>`;
            }
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        function editProduct(p) {
            openProductModal(p);
        }

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            if (state.isUploading) {
                showAlert("Rasm yuklanmoqda, iltimos kuting...");
                return;
            }
            const id = document.getElementById('p-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                price: parseInt(document.getElementById('p-price').value),
                vip_price: parseInt(document.getElementById('p-vip-price').value),
                category: document.getElementById('p-category').value,
                stock: parseInt(document.getElementById('p-stock').value),
                image: document.getElementById('p-image-url').value
            };

            const url = id ? `${API_BASE}/products/${id}` : `${API_BASE}/products`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    closeModal();
                    await fetchData();
                    renderView(state.currentView);
                }
            } catch (e) { showAlert("Server xatosi"); }
        };

        async function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;

            state.isUploading = true;
            const btn = document.querySelector('#product-form button[type="button"]');
            const oldBtnText = btn.innerText;
            btn.innerText = "YUKLANMOQDA...";
            btn.style.opacity = "0.5";
            document.getElementById('image-preview').innerHTML = '<div class="premium-loader" style="transform: scale(0.5);"></div>';

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result;
                try {
                    const res = await fetch(`${API_BASE}/upload`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: file.name,
                            data: base64Data
                        })
                    });
                    const result = await res.json();
                    if (result.success) {
                        document.getElementById('p-image-url').value = result.url;
                        document.getElementById('image-preview').innerHTML = `<img src="${result.url}" style="width: 100%; height: 100%; object-fit: cover;">`;
                    } else {
                        showAlert("Rasm yuklashda xatolik");
                    }
                } catch (err) {
                    showAlert("Server bilan aloqa uzildi");
                } finally {
                    state.isUploading = false;
                    btn.innerText = oldBtnText;
                    btn.style.opacity = "1";
                }
            };
            reader.readAsDataURL(file);
        }

        // Modalni chetdan yopish
        window.onclick = (e) => {
            if (e.target.classList.contains('modal-overlay')) closeModal();
        };

        init();
    </script>
</body>
</html>
