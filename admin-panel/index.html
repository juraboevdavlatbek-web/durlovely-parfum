<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DURLOVELY | Admin Panel</title>
    <link rel="stylesheet" href="../shared-assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #A16207;
            --border: rgba(255,255,255,0.05);
        }
        body {
            background: #050505;
            color: #eee;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jost', sans-serif;
            margin: 0;
        }

        /* --- Original Sidebar Look --- */
        aside {
            width: 260px;
            background: #0c0a09;
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .nav-item {
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #888;
            text-decoration: none;
            transition: 0.3s;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .nav-item:hover {
            color: #eee;
            background: rgba(255,255,255,0.02);
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(161,98,7,0.05);
        }

        /* --- Main Content --- */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* --- Original Table Style --- */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead tr {
            border-bottom: 1px solid var(--border);
            color: #666;
            font-size: 13px;
        }

        th {
            padding: 15px 0;
            font-weight: 500;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.01);
        }

        td {
            padding: 20px 0;
            font-size: 14px;
        }

        /* --- UI Components --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .chart-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            height: 400px;
        }

        .stat-card {
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
        }

        /* Status Badges */
        .status-badge {
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending { background: rgba(161,98,7,0.1); color: var(--accent); }
        .status-delivered { background: rgba(34,197,94,0.1); color: #22c55e; }
        .status-cancelled { background: rgba(239,68,68,0.1); color: #ef4444; }
        .status-paid { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
        .status-unpaid { background: rgba(161,98,7,0.1); color: var(--accent); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #111;
            width: 480px;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #666; }
        input, select, textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--border);
            padding: 12px 14px;
            border-radius: 10px;
            color: #eee;
            font-family: inherit;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-exit {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: #888;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn-exit:hover { color: #eee; background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); }
    
        .btn-primary-old {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <aside>
        <div class="brand-section">
            <img src="../shared-assets/assets/images/logo.png" style="width: 60px; height: 60px; border-radius: 50%;">
            <h1 class="luxury-text gold-text" style="font-size: 1.5rem; margin: 0; text-align: center;">DURLOVELY</h1>
        </div>
        
            <a href="#" class="nav-item" onclick="switchView('customers', this)">
                <i class="fa-solid fa-users"></i>
                <span>Mijozlar</span>
            </a>
            <a href="#" class="nav-item" onclick="switchView('notifs', this)">
                <i class="fa-solid fa-bell"></i>
                <span>Xabarnomalar</span>
            </a>
        </nav>

        <button class="btn-exit" onclick="window.location.reload()">CHIQISH</button>
    </aside>

    <main id="main-content">
        <!-- Dynamic Content -->
    </main>

    <!-- Product Modal -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="luxury-text" id="modal-title" style="font-size: 1.3rem; margin-bottom: 25px;">Yangi Mahsulot</h3>
            <form id="product-form">
                <input type="hidden" id="p-id">
                <div class="form-group">
                    <label>Nomi</label>
                    <input type="text" id="p-name" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Standard Narxi (UZS)</label>
                        <input type="number" id="p-price" required>
                    </div>
                    <div class="form-group">
                        <label>VIP Narxi (UZS)</label>
                        <input type="number" id="p-vip-price" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Kategoriya</label>
                    <select id="p-category"></select>
                </div>
                <div class="form-group">
                    <label>Stokda (dona)</label>
                    <input type="number" id="p-stock" required>
                </div>
                <div class="form-group">
                    <label>Mahsulot rasm URL</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="p-image-url" placeholder="https://..." style="flex: 1;">
                        <input type="file" id="p-image-file" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">
                        <button type="button" onclick="document.getElementById('p-image-file').click()" style="padding: 0 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; color: #888;">
                            <i class="fa-solid fa-upload"></i>
                        </button>
                    </div>
                    <div id="upload-status" style="font-size: 10px; margin-top: 5px; color: var(--accent);"></div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 25px;">
                    <button type="button" onclick="closeModal()" style="background: none; border: 1px solid var(--border); color: #888; flex: 1; padding: 12px; border-radius: 10px; cursor: pointer;">BEKOR</button>
                    <button type="submit" class="btn-primary-old" style="flex: 1.5;">SAQLASH</button>
                </div>
            </form>
        </div>
    <!-- Customer Points Modal -->
    <div id="points-modal" class="modal-overlay">
        <div class="modal-content" style="width: 320px;">
            <h3 class="luxury-text" style="font-size: 1.2rem; margin-bottom: 20px;">Ballarni Tahrirlash</h3>
            <form id="points-form">
                <input type="hidden" id="cust-id">
                <div class="form-group">
                    <label>Mijoz ballari (Dur)</label>
                    <input type="number" id="cust-dur" step="0.1" required>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 25px;">
                    <button type="button" onclick="closePointsModal()" style="background: none; border: 1px solid var(--border); color: #888; flex: 1; padding: 10px; border-radius: 8px; cursor: pointer;">BEKOR</button>
                    <button type="submit" class="btn-primary-old" style="flex: 1.5;">SAQLASH</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const state = {
            view: 'dashboard',
            orders: [],
            products: [],
            categories: [],
            customers: [],
            notifs: []
        };

        const API_BASE = '/api';

        async function init() {
            await fetchData();
            renderView();
        }

        async function fetchData() {
            try {
                const [ordersRes, productsRes, categoriesRes, customersRes, notifsRes] = await Promise.all([
                    fetch(`${API_BASE}/orders`),
                    fetch(`${API_BASE}/products`),
                    fetch(`${API_BASE}/categories`),
                    fetch(`${API_BASE}/customers`).catch(() => ({ json: () => [] })),
                    fetch(`${API_BASE}/notifications`).catch(() => ({ json: () => [] }))
                ]);
                state.orders = await ordersRes.json();
                state.products = await productsRes.json();
                state.categories = await categoriesRes.json();
                state.customers = customersRes.ok ? await customersRes.json() : [];
                state.notifs = notifsRes.ok ? await notifsRes.json() : [];
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function switchView(view, el) {
            state.view = view;
            document.querySelectorAll('.nav-item').forEach(link => link.classList.remove('active'));
            el.classList.add('active');
            renderView();
        }

        function renderView() {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <header>
                    <h2 class="luxury-text" style="font-size: 2rem;">${state.view.charAt(0).toUpperCase() + state.view.slice(1)}</h2>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <span style="font-size: 14px; color: #666;">Salom, Admin</span>
                        <img src="../shared-assets/assets/images/logo.png" style="width: 40px; height: 40px; border-radius: 50%;">
                    </div>
                </header>
            `;
            
            if (state.view === 'dashboard') renderDashboard(container);
            if (state.view === 'orders') renderOrders(container);
            if (state.view === 'products') renderProducts(container);
            if (state.view === 'customers') renderCustomers(container);
            if (state.view === 'notifs') renderNotifs(container);
        }

        function renderDashboard(container) {
            const totalSotuv = state.orders.reduce((acc, o) => {
                const val = o.total ? String(o.total).replace(/,/g, '') : '0';
                return acc + parseInt(val || 0);
            }, 0);
            const pendingOrders = state.orders.filter(o => o.status === 'pending').length;

            container.innerHTML += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div style="color: #666; font-size: 11px; text-transform: uppercase;">Bugun Sotuv</div>
                        <div style="font-size: 24px; font-weight: 700; margin-top: 5px;">${totalSotuv.toLocaleString()} UZS</div>
                    </div>
                    <div class="stat-card">
                        <div style="color: #666; font-size: 11px; text-transform: uppercase;">Yangi Buyurtma</div>
                        <div style="font-size: 24px; font-weight: 700; margin-top: 5px; color: var(--accent);">${pendingOrders} ta</div>
                    </div>
                    <div class="stat-card">
                        <div style="color: #666; font-size: 11px; text-transform: uppercase;">Mahsulotlar</div>
                        <div style="font-size: 24px; font-weight: 700; margin-top: 5px;">${state.products.length} xil</div>
                    </div>
                    <div class="stat-card">
                        <div style="color: #666; font-size: 11px; text-transform: uppercase;">Mijozlar</div>
                        <div style="font-size: 24px; font-weight: 700; margin-top: 5px;">${state.customers.length || '1,200+'}</div>
                    </div>
                </div>
                
                <div style="background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; border: 1px solid var(--border);">
                    <h3 class="luxury-text" style="font-size: 1.5rem; margin-bottom: 25px;">Oxirgi Buyurtmalar</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>MIJOZ</th>
                                <th>SUMMA</th>
                                <th>TO'LOV</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${state.orders.slice(0, 5).map(o => `
                                <tr>
                                    <td>#${o.id}</td>
                                    <td>${o.customer || o.name || 'Mijoz'}</td>
                                    <td style="font-weight: 600;">${o.total} UZS</td>
                                    <td>
                                        <span class="status-badge ${o.paymentStatus === 'paid' ? 'status-paid' : 'status-unpaid'}">
                                            ${o.paymentStatus === 'paid' ? 'To\'langan' : 'Kutilmoqda'}
                                        </span>
                                    </td>
                                    <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderOrders(container) {
            container.innerHTML += `
                <div style="background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; border: 1px solid var(--border);">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>MIJOZ</th>
                                <th>MAHSULOTLAR</th>
                                <th>SUMMA</th>
                                <th>TO'LOV</th>
                                <th>STATUS</th>
                                <th style="text-align: right;">AMAL</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${state.orders.map(o => `
                                <tr>
                                    <td>#${o.id}</td>
                                    <td>${o.customer || o.name || 'Mijoz'}</td>
                                    <td style="max-width: 200px; font-size: 12px; color: #888;">${(o.items || []).join(', ')}</td>
                                    <td style="font-weight: 600;">${o.total || '0'} UZS</td>
                                    <td>
                                        <span class="status-badge ${o.paymentStatus === 'paid' ? 'status-paid' : 'status-unpaid'}">
                                            ${o.paymentStatus === 'paid' ? 'To\'langan' : 'Kutilmoqda'}
                                        </span>
                                    </td>
                                    <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                                    <td style="text-align: right;">
                                        <select onchange="updateOrderStatus(${o.id}, this.value)" style="width: auto; padding: 5px; font-size: 11px; background: rgba(255,255,255,0.05); border: none; color: #eee; border-radius: 6px;">
                                            <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Kutishda</option>
                                            <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Yetkazildi</option>
                                            <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Bekor</option>
                                        </select>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderProducts(container) {
            container.innerHTML += `
                <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                    <button class="btn-primary-old" onclick="openProductModal()">+ YANGI QO'SHISH</button>
                </div>
                <div style="background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; border: 1px solid var(--border);">
                    <table>
                        <thead>
                            <tr>
                                <th>NOMI</th>
                                <th>KATEGORIYA</th>
                                <th>NARX</th>
                                <th>VIP NARX</th>
                                <th>STOK</th>
                                <th style="text-align: right;">AMALLAR</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${state.products.map(p => `
                                <tr>
                                    <td>${p.name}</td>
                                    <td>${p.category}</td>
                                    <td>${p.price.toLocaleString()}</td>
                                    <td style="color: var(--accent); font-weight: 700;">${p.vip_price.toLocaleString()}</td>
                                    <td>${p.stock} ta</td>
                                    <td style="text-align: right;">
                                        <button onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&apos;")})' style="background: none; border: none; color: #888; cursor: pointer; margin-right: 15px;"><i class="fa-solid fa-edit"></i></button>
                                        <button onclick="deleteProduct(${p.id})" style="background: none; border: none; color: #ef4444; cursor: pointer;"><i class="fa-solid fa-trash"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderCustomers(container) {
            container.innerHTML += `
                <div class="stats-grid">
                    ${state.customers.length > 0 ? state.customers.map(c => `
                        <div class="stat-card" style="display: flex; align-items: center; justify-content: space-between; gap: 15px;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 38px; height: 38px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent);">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <div>
                                    <div style="font-weight: 600; font-size: 14px;">${c.firstName || 'Mijoz'}</div>
                                    <div style="font-size: 11px; color: #666;">${c.phone}</div>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-weight: 700; color: #fff; font-size: 16px;">${(c.dur || 0).toFixed(1)} <span style="font-size: 10px; color: var(--accent);">DUR</span></div>
                                <button onclick='openPointsModal(${JSON.stringify(c).replace(/'/g, "&apos;")})' style="background: none; border: none; color: #888; font-size: 11px; cursor: pointer; text-decoration: underline;">O'zgartirish</button>
                            </div>
                        </div>
                    `).join('') : '<p style="color: #666;">Hozircha mijozlar mavjud emas.</p>'}
                </div>
            `;
        }

        function renderNotifs(container) {
            container.innerHTML += `
                <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;">
                    <div style="background: rgba(255,255,255,0.02); padding: 25px; border-radius: 20px; border: 1px solid var(--border);">
                        <h3 style="margin-bottom: 20px; font-size: 16px;">Yangi xabar yuborish</h3>
                        <form onsubmit="sendNotif(event)">
                            <div class="form-group">
                                <label>Mavzu</label>
                                <input type="text" id="n-title" required>
                            </div>
                            <div class="form-group">
                                <label>Xabar</label>
                                <textarea id="n-message" rows="4" style="width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 10px;"></textarea>
                            </div>
                            <button type="submit" class="btn-primary-old" style="width: 100%;">YUBORISH</button>
                        </form>
                    </div>
                    <div style="background: rgba(255,255,255,0.02); padding: 25px; border-radius: 20px; border: 1px solid var(--border);">
                        <h3 style="margin-bottom: 20px; font-size: 16px;">Tarix</h3>
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            ${state.notifs.map(n => `
                                <div style="padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.03);">
                                    <div style="font-weight: 700; font-size: 14px;">${n.title}</div>
                                    <div style="font-size: 12px; color: #888; margin-top: 5px;">${n.message || n.text}</div>
                                    <div style="font-size: 10px; color: #444; margin-top: 5px;">${n.date}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        async function updateOrderStatus(id, status) {
            try {
                const res = await fetch(`${API_BASE}/orders/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (res.ok) { await fetchData(); renderView(); }
            } catch (e) { alert("Xatolik!"); }
        }

        async function deleteProduct(id) {
            if (!confirm("O'chirilsinmi?")) return;
            try {
                const res = await fetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
                if (res.ok) { await fetchData(); renderView(); }
            } catch (e) { alert("Xatolik!"); }
        }

        async function sendNotif(e) {
            e.preventDefault();
            const data = {
                title: document.getElementById('n-title').value,
                message: document.getElementById('n-message').value
            };
            try {
                const res = await fetch(`${API_BASE}/notifications`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) { alert("Yuborildi!"); await fetchData(); renderView(); }
            } catch (e) { alert("Xatolik!"); }
        }

        function openProductModal(p = null) {
            const modal = document.getElementById('product-modal');
            const catSelect = document.getElementById('p-category');
            catSelect.innerHTML = state.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            
            if (p) {
                document.getElementById('modal-title').innerText = "Tahrirlash";
                document.getElementById('p-id').value = p.id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-vip-price').value = p.vip_price;
                document.getElementById('p-category').value = p.category;
                document.getElementById('p-stock').value = p.stock;
                document.getElementById('p-image-url').value = p.image || '';
            } else {
                document.getElementById('modal-title').innerText = "Yangi Mahsulot";
                document.getElementById('product-form').reset();
                document.getElementById('p-id').value = '';
            }
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('product-modal').style.display = 'none'; }
        function editProduct(p) { openProductModal(p); }

        function openPointsModal(c) {
            document.getElementById('cust-id').value = c.id;
            document.getElementById('cust-dur').value = c.dur || 0;
            document.getElementById('points-modal').style.display = 'flex';
        }

        function closePointsModal() {
            document.getElementById('points-modal').style.display = 'none';
        }

        document.getElementById('points-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('cust-id').value;
            const dur = parseFloat(document.getElementById('cust-dur').value);
            
            try {
                const res = await fetch(`${API_BASE}/customers/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dur })
                });
                if (res.ok) { closePointsModal(); await fetchData(); renderView(); }
            } catch (e) { alert("Xatolik!"); }
        };

        async function handleImageUpload(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const status = document.getElementById('upload-status');
            
            // Limit file size to 2MB to keep MongoDB documents small
            if (file.size > 2 * 1024 * 1024) {
                status.innerText = "❌ Fayl juda katta (max 2MB)!";
                return;
            }

            status.innerText = "Tayyorlanmoqda...";
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result;
                document.getElementById('p-image-url').value = base64Data;
                status.innerText = "✅ Rasm tayyor (Saqlashni bosing)!";
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                price: parseInt(document.getElementById('p-price').value),
                vip_price: parseInt(document.getElementById('p-vip-price').value),
                category: document.getElementById('p-category').value,
                stock: parseInt(document.getElementById('p-stock').value),
                image: document.getElementById('p-image-url').value
            };

            const url = id ? `${API_BASE}/products/${id}` : `${API_BASE}/products`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) { 
                    closeModal(); 
                    document.getElementById('upload-status').innerText = "";
                    await fetchData(); 
                    renderView(); 
                }
            } catch (e) { alert("Server xatosi"); }
        };

        window.onclick = (e) => { if (e.target.classList.contains('modal-overlay')) closeModal(); };

        init();
    </script>
</body>
</html>
